<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ocean — Top Down</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap');
        html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #brand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            color: #eaf3ff;
        }
        #brand .title {
            font-weight: 700;
            font-size: clamp(14px, 2.1vw, 32px);
            letter-spacing: 0.45em;
            text-transform: uppercase;
            text-shadow:
                0 0 8px rgba(120, 180, 255, 0.55),
                0 0 22px rgba(74, 158, 255, 0.45),
                0 0 48px rgba(40, 100, 220, 0.35);
            padding-left: 0.45em;
        }
        #brand .sub {
            margin-top: 0.9em;
            font-weight: 400;
            font-size: clamp(9px, 0.825vw, 12px);
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: rgba(200, 220, 255, 0.78);
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.35);
            padding-left: 0.6em;
        }
    </style>
</head>
<body>
    <div id="brand">
        <div class="title">The Avaikians</div>
        <div class="sub">Foundations Series</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import GUI from 'lil-gui';

        let scene, camera, renderer, water, sky, sun, clock, orbRing, composer, bloomPass;
        const drag = { active: false, lastX: 0, velocity: 0 };
        const settings = {
            // Sky
            turbidity: 20,
            rayleigh: 1.935,
            mieCoefficient: 0.1,
            mieDirectionalG: 1,
            elevation: 4,
            azimuth: 180,
            // Water
            waterColor: '#0a054d',
            sunColor: '#ffffff',
            distortionScale: 3.7,
            waveSize: 4.6,
            alpha: 1,
            timeSpeed: 0.71,
            // Camera
            cameraHeight: 213,
            cameraTilt: 386.98,
            fov: 35,
            // Renderer
            exposure: 0.52,
            // Bloom
            bloomStrength: 0.2,
            bloomRadius: 0.5,
            bloomThreshold: 0.2,
        };

        init();
        animate();

        function init() {
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = settings.exposure;
            document.body.appendChild(renderer.domElement);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(settings.fov, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.set(0, settings.cameraHeight, settings.cameraTilt);
            camera.lookAt(0, 0, 0);

            sun = new THREE.Vector3();

            // --- Water (canonical defaults from three.js webgl_shaders_ocean) ---
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            water = new Water(waterGeometry, {
                textureWidth: 512,
                textureHeight: 512,
                waterNormals: new THREE.TextureLoader().load(
                    'https://threejs.org/examples/textures/waternormals.jpg',
                    (texture) => {
                        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                    }
                ),
                sunDirection: new THREE.Vector3(),
                sunColor: settings.sunColor,
                waterColor: settings.waterColor,
                distortionScale: settings.distortionScale,
                fog: scene.fog !== undefined,
            });
            water.rotation.x = -Math.PI / 2;
            water.material.uniforms['size'].value = settings.waveSize;
            water.material.uniforms['alpha'].value = settings.alpha;
            scene.add(water);

            // --- Sky ---
            sky = new Sky();
            sky.scale.setScalar(10000);
            scene.add(sky);

            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            const sceneEnv = new THREE.Scene();
            let renderTarget;

            function updateSky() {
                const u = sky.material.uniforms;
                u['turbidity'].value = settings.turbidity;
                u['rayleigh'].value = settings.rayleigh;
                u['mieCoefficient'].value = settings.mieCoefficient;
                u['mieDirectionalG'].value = settings.mieDirectionalG;
            }

            function updateSun() {
                const phi = THREE.MathUtils.degToRad(90 - settings.elevation);
                const theta = THREE.MathUtils.degToRad(settings.azimuth);
                sun.setFromSphericalCoords(1, phi, theta);

                sky.material.uniforms['sunPosition'].value.copy(sun);
                water.material.uniforms['sunDirection'].value.copy(sun).normalize();

                if (renderTarget !== undefined) renderTarget.dispose();
                sceneEnv.add(sky);
                renderTarget = pmremGenerator.fromScene(sceneEnv);
                scene.add(sky);
                scene.environment = renderTarget.texture;
            }

            function updateCamera() {
                camera.position.set(0, settings.cameraHeight, settings.cameraTilt);
                camera.fov = settings.fov;
                camera.lookAt(0, 0, 0);
                camera.updateProjectionMatrix();
            }

            updateSky();
            updateSun();

            // --- Orb ring ---
            orbRing = new THREE.Group();
            orbRing.position.y = 22;

            const orbCount = 8;
            const ringRadius = 140;
            const portraitSize = 24;
            const glowSize = 27;

            const ringGeom = new THREE.TorusGeometry(ringRadius, 0.7, 16, 640);
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0x1a4dff,
                emissive: 0x4aa0ff,
                emissiveIntensity: 8,
                metalness: 0.4,
                roughness: 0.2,
            });
            const ring = new THREE.Mesh(ringGeom, ringMat);
            ring.rotation.x = Math.PI / 2;
            orbRing.add(ring);

            const portraitFiles = [
                'tohunga/dr-teina-rongo.jpg',
                'tohunga/mike-tavioni.jpg',
                'tohunga/peia-patai.jpg',
                'tohunga/ben-koteka.jpg',
                'tohunga/ian-tairea.jpg',
                'tohunga/victor-mataora.jpg',
                'tohunga/alanna-smith.jpg',
                'tohunga/liam-kokaua.jpg',
            ];

            function makeGlowTexture() {
                const size = 256;
                const c = document.createElement('canvas');
                c.width = c.height = size;
                const ctx = c.getContext('2d');
                const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
                g.addColorStop(0.0, 'rgba(255,255,255,0)');
                g.addColorStop(0.82, 'rgba(255,255,255,0)');
                g.addColorStop(0.9, 'rgba(255,255,255,1)');
                g.addColorStop(1.0, 'rgba(255,255,255,0)');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, size, size);
                return new THREE.CanvasTexture(c);
            }

            function makeCircularPortraitTexture(url) {
                const size = 512;
                const c = document.createElement('canvas');
                c.width = c.height = size;
                const ctx = c.getContext('2d');
                const tex = new THREE.CanvasTexture(c);
                tex.colorSpace = THREE.SRGBColorSpace;
                tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, size, size);
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.clip();
                    const ar = img.width / img.height;
                    let sw, sh, sx, sy;
                    if (ar > 1) { sh = img.height; sw = sh; sx = (img.width - sw) / 2; sy = 0; }
                    else { sw = img.width; sh = sw; sx = 0; sy = (img.height - sh) / 2; }
                    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);
                    ctx.restore();
                    tex.needsUpdate = true;
                };
                img.src = url;
                return tex;
            }

            const glowTexture = makeGlowTexture();

            for (let i = 0; i < orbCount; i++) {
                const angle = (i / orbCount) * Math.PI * 2;
                const x = Math.cos(angle) * ringRadius;
                const z = Math.sin(angle) * ringRadius;

                const glowMat = new THREE.SpriteMaterial({
                    map: glowTexture,
                    color: 0x4aa0ff,
                    transparent: true,
                    depthWrite: false,
                    depthTest: false,
                    blending: THREE.AdditiveBlending,
                });
                const glowSprite = new THREE.Sprite(glowMat);
                glowSprite.position.set(x, 0, z);
                glowSprite.scale.set(glowSize, glowSize, 1);
                glowSprite.renderOrder = 2;
                orbRing.add(glowSprite);

                const portraitTex = makeCircularPortraitTexture(portraitFiles[i]);
                const portraitMat = new THREE.SpriteMaterial({
                    map: portraitTex,
                    transparent: true,
                    depthWrite: false,
                    depthTest: false,
                });
                const portraitSprite = new THREE.Sprite(portraitMat);
                portraitSprite.position.set(x, 0, z);
                portraitSprite.scale.set(portraitSize, portraitSize, 1);
                portraitSprite.renderOrder = 3;
                orbRing.add(portraitSprite);

                const orbLight = new THREE.PointLight(0x4a9eff, 5, 150, 2);
                orbLight.position.set(x, 0, z);
                orbRing.add(orbLight);
            }

            scene.add(orbRing);

            // Hide the orb ring entirely during the water's reflection pass,
            // so portraits/glow/ring don't show up as bright blobs on the water surface.
            const waterRender = water.onBeforeRender;
            water.onBeforeRender = function (renderer, scene, camera) {
                orbRing.visible = false;
                waterRender.call(this, renderer, scene, camera);
                orbRing.visible = true;
            };

            // --- Postprocessing (bloom) ---
            composer = new EffectComposer(renderer);
            composer.setPixelRatio(window.devicePixelRatio);
            composer.setSize(window.innerWidth, window.innerHeight);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                settings.bloomStrength,
                settings.bloomRadius,
                settings.bloomThreshold,
            );
            composer.addPass(bloomPass);
            composer.addPass(new OutputPass());

            // --- GUI (disabled — uncomment to re-enable the live control panel) ---
            /*
            const gui = new GUI({ title: 'Ocean controls' });

            const skyFolder = gui.addFolder('Sky');
            skyFolder.add(settings, 'turbidity', 0, 20, 0.1).onChange(() => { updateSky(); updateSun(); });
            skyFolder.add(settings, 'rayleigh', 0, 4, 0.001).onChange(() => { updateSky(); updateSun(); });
            skyFolder.add(settings, 'mieCoefficient', 0, 0.1, 0.001).onChange(() => { updateSky(); updateSun(); });
            skyFolder.add(settings, 'mieDirectionalG', 0, 1, 0.001).onChange(() => { updateSky(); updateSun(); });
            skyFolder.add(settings, 'elevation', -10, 90, 0.1).onChange(updateSun);
            skyFolder.add(settings, 'azimuth', -180, 180, 0.1).onChange(updateSun);

            const waterFolder = gui.addFolder('Water');
            waterFolder.addColor(settings, 'waterColor').onChange((v) => {
                water.material.uniforms['waterColor'].value.set(v);
            });
            waterFolder.addColor(settings, 'sunColor').onChange((v) => {
                water.material.uniforms['sunColor'].value.set(v);
            });
            waterFolder.add(settings, 'distortionScale', 0, 8, 0.1).onChange((v) => {
                water.material.uniforms['distortionScale'].value = v;
            });
            waterFolder.add(settings, 'waveSize', 0.1, 10, 0.1).onChange((v) => {
                water.material.uniforms['size'].value = v;
            });
            waterFolder.add(settings, 'alpha', 0, 1, 0.01).onChange((v) => {
                water.material.uniforms['alpha'].value = v;
            });
            waterFolder.add(settings, 'timeSpeed', 0, 4, 0.01);

            const camFolder = gui.addFolder('Camera');
            camFolder.add(settings, 'cameraHeight', 50, 4000, 1).onChange(updateCamera);
            camFolder.add(settings, 'cameraTilt', 0.01, 800, 0.01).name('forward offset').onChange(updateCamera);
            camFolder.add(settings, 'fov', 10, 120, 1).onChange(updateCamera);

            const rFolder = gui.addFolder('Renderer');
            rFolder.add(settings, 'exposure', 0, 2, 0.01).onChange((v) => {
                renderer.toneMappingExposure = v;
            });

            const bloomFolder = gui.addFolder('Bloom');

            bloomFolder.add(settings, 'bloomRadius', 0, 2, 0.01).onChange((v) => { bloomPass.radius = v; });
            bloomFolder.add(settings, 'bloomThreshold', 0, 1, 0.01).onChange((v) => { bloomPass.threshold = v; });

            const actions = {
                copySettings: async () => {
                    const json = JSON.stringify(settings, null, 2);
                    try {
                        await navigator.clipboard.writeText(json);

                        console.error('Clipboard failed:', e);
                        console.log(json);
                        actions._btn.name('Failed — see console');
                    }
                },
            };
            actions._btn = gui.add(actions, 'copySettings').name('Copy settings to clipboard');
            */

            clock = new THREE.Clock();
            window.addEventListener('resize', onResize);

            // --- Pointer drag to rotate ring ---
            const dragSensitivity = 0.005;
            const canvas = renderer.domElement;
            canvas.style.touchAction = 'none';
            canvas.addEventListener('pointerdown', (e) => {
                drag.active = true;
                drag.lastX = e.clientX;
                drag.velocity = 0;
                canvas.setPointerCapture(e.pointerId);
            });
            canvas.addEventListener('pointermove', (e) => {
                if (!drag.active) return;
                const dx = e.clientX - drag.lastX;
                drag.lastX = e.clientX;
                const delta = dx * dragSensitivity;
                orbRing.rotation.y += delta;
                drag.velocity = delta;
            });
            const endDrag = (e) => {
                if (!drag.active) return;
                drag.active = false;
                try { canvas.releasePointerCapture(e.pointerId); } catch {}
            };
            canvas.addEventListener('pointerup', endDrag);
            canvas.addEventListener('pointercancel', endDrag);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            water.material.uniforms['time'].value += dt * settings.timeSpeed;
            if (orbRing) {
                const t = performance.now() * 0.001;
                orbRing.position.y = 22 + Math.sin(t * 0.6) * 1.5;
                if (!drag.active) {
                    orbRing.rotation.y += 0.05 * dt;
                    if (Math.abs(drag.velocity) > 1e-4) {
                        orbRing.rotation.y += drag.velocity;
                        drag.velocity *= 0.94;
                    }
                }
            }
            composer.render();
        }
    </script>
</body>
</html>
